{{ $img := resources.Get "img/banner_v1.jpg" }}
<style>
  body {
    background: 
      linear-gradient(rgba(13, 17, 23, 0.8), rgba(13, 17, 23, 0.8)), 
      {{ if $img }} url('{{ $img.RelPermalink }}') {{ end }} no-repeat center center fixed;
    background-size: cover !important;
  }
</style>

<div class="flex flex-col items-center justify-center text-center mt-10">
  <div class="relative w-full max-w-2xl px-4 mb-8">
    {{ if $img }}
    <img src="{{ $img.RelPermalink }}" 
         alt="traceHeuristics HUD" 
         class="w-full h-auto rounded-lg border border-primary-500 shadow-lg shadow-primary-500/20">
    {{ else }}
    <p class="text-red-500 font-mono">[ ERROR: ASSET_NOT_FOUND ]</p>
    {{ end }}
  </div>

  <h1 class="text-4xl font-extrabold text-neutral-100 mb-2">
    traceHeuristics
  </h1>
  <p class="text-lg font-mono text-primary-500 tracking-widest uppercase">
    init_analyst –ttl-increment 1
  </p>
</div>
